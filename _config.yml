# Site Settings
title: "0x5h4q"
subtitle: "n0 pl4c3 l1k3 127.0.0.1"
email:
description: >-
  Security researcher | Pentesting | CTFs | Active Directory
  Breaking things. Writing about it. Repeat.
twitter_username: 0x5h4q
github_username: 0x5h4q
minimal_mistakes_skin: "dark"
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes

# Favicon
favicon: "/assets/images/favicon.ico"

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: Africa/Lagos

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "0x5h4q"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "PJPT | HTB | Top 6% THM | Arch"
  location: "Nigeria"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/0x5h4q"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/0x5h4q"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/
